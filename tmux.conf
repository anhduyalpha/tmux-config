# ╔══════════════════════════════════════════════════════════════╗
# ║  Tmux Configuration - Orange & Brown Warm Theme             ║
# ║  Repository: ~/tmux-config                                  ║
# ╚══════════════════════════════════════════════════════════════╝

# ── General Settings ──────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -sg escape-time 0
set -g display-time 3000
set -g status-interval 5

# ── Prefix Key (F7) ───────────────────────────────────────────
unbind C-b
set -g prefix F7
bind F7 send-prefix

# ── Easy Reload ───────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message " Config reloaded!"

# ── Split Panes (intuitive keys) ─────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Navigate Panes (vim-style) ───────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Resize Panes ─────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── New Window with current path ──────────────────────────────
bind c new-window -c "#{pane_current_path}"

# ── Window Navigation ─────────────────────────────────────────
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind { previous-window
bind } next-window

# ── Copy Mode (vi) ───────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard 2>/dev/null || pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# ── Activity Alerts ───────────────────────────────────────────
setw -g monitor-activity on
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off

# ══════════════════════════════════════════════════════════════
#  THEME: Warm Orange & Brown
# ══════════════════════════════════════════════════════════════

# ── Color Palette ─────────────────────────────────────────────
# Black/Brown tones
bg_dark="#1a1410"
bg_medium="#2d2319"
bg_light="#3d2e1f"
bg_highlight="#4d3a28"

# Orange tones
orange_dim="#7a5a30"
orange="#c47820"
orange_bright="#e89a3c"
orange_light="#f5b858"
orange_white="#fcd59a"

# Text
text_normal="#d4c4a8"
text_dim="#8a7a60"
text_bright="#f0e6d0"

# Accent
red="#cc5533"
green="#8aad5a"
cyan="#6aaa9a"

# ── Status Bar Position ───────────────────────────────────────
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=${bg_dark},fg=${text_normal}"

# ── Status Left ───────────────────────────────────────────────
set -g status-left-length 40
set -g status-left "\
#[fg=${bg_dark},bg=${orange_bright},bold] \
#[fg=${bg_dark}] #{session_name} \
#[fg=${orange_bright},bg=${orange},bold]\
#[fg=${bg_dark},bg=${orange}] #I:#P \
#[fg=${orange},bg=${bg_dark}] "

# ── Status Right ──────────────────────────────────────────────
set -g status-right-length 80
set -g status-right "\
#[fg=${orange_dim}]\
#[fg=${orange},bg=${bg_dark}] %H:%M \
#[fg=${bg_dark},bg=${orange}]\
#[fg=${bg_dark}] %d/%m \
#[fg=${orange},bg=${bg_dark},fg=${orange_bright}]\
#[fg=${bg_dark},bg=${orange_bright},bold] %a "

# ── Window Status ─────────────────────────────────────────────
setw -g window-status-format "\
#[fg=${bg_dark},bg=${bg_highlight}]\
#[fg=${text_dim}] #I  #W "

setw -g window-status-current-format "\
#[fg=${bg_dark},bg=${orange_bright}]\
#[fg=${bg_dark},bold] #I  #W "

setw -g window-status-separator "#[fg=${bg_highlight},bg=${bg_dark}]"

# ── Pane Borders ──────────────────────────────────────────────
set -g pane-border-style "fg=${bg_highlight}"
set -g pane-active-border-style "fg=${orange}"

# ── Message Style ─────────────────────────────────────────────
set -g message-style "fg=${orange_bright},bg=${bg_medium},bold"
set -g message-command-style "fg=${text_normal},bg=${bg_medium}"

# ── Clock Mode ────────────────────────────────────────────────
setw -g clock-mode-colour ${orange_bright}
setw -g clock-mode-style 24

# ── Popup Windows ─────────────────────────────────────────────
set -g popup-style "fg=${text_normal},bg=${bg_medium}"
set -g popup-border-style "fg=${orange}"

# ── Mode (copy mode highlight) ────────────────────────────────
setw -g mode-style "fg=${bg_dark},bg=${orange_bright},bold"
